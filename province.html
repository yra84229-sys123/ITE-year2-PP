<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Province Details - Find Your Trip</title>
   
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main id="detail-view" class="view active">
        <div class="detail-header" id="detail-header">
            <div class="hero-overlay"></div>
            <a href="index.html" class="back-btn" id="back-btn">
                <i class="fa-solid fa-arrow-left"></i> Back to Home
            </a>
            <div class="detail-title-container">
                <h1 id="detail-province-name">Loading...</h1>
                <p>5 Famous Places to Visit</p>
            </div>
        </div>

        <section class="map-section">
            <div class="container">
                <h2 class="section-title">Location Map</h2>
                <div class="map-container" id="province-map-container">
                    <!-- Map iframe injected by JS -->
                </div>
            </div>
        </section>

        <section class="places-section">
            <div class="container">
                <div class="places-grid" id="places-grid">
                    <!-- Places injected by JS -->
                </div>
            </div>
        </section>

        <!-- Contact Section -->
        <section id="contact" class="contact-section">
            <div class="container">
                <div class="contact-box">
                    <h2 class="contact-title">Contact Information</h2>
                    <div class="contact-grid">
                        <div class="contact-item">
                            <div class="contact-icon">
                                <i class="fa-regular fa-envelope"></i>
                            </div>
                            <div class="contact-details">
                                <h3>Email</h3>
                                <p>yourname@gmail.com</p>
                            </div>
                        </div>
                        <div class="contact-item">
                            <div class="contact-icon">
                                <i class="fa-solid fa-phone"></i>
                            </div>
                            <div class="contact-details">
                                <h3>Phone</h3>
                                <p>012-xxx-xxx</p>
                            </div>
                        </div>
                        <div class="contact-item">
                            <div class="contact-icon">
                                <i class="fa-solid fa-location-dot"></i>
                            </div>
                            <div class="contact-details">
                                <h3>Location</h3>
                                <p>Phnom Penh, Cambodia</p>
                            </div>
                        </div>
                        <div class="contact-item">
                            <div class="contact-icon">
                                <i class="fa-solid fa-globe"></i>
                            </div>
                            <div class="contact-details">
                                <h3>Social Media</h3>
                                <div class="social-links">
                                    <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                                    <a href="#"><i class="fa-brands fa-instagram"></i></a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <footer>
            <div class="container">
                <p> Find Your Trip discover Cambodia.</p>
            </div>
        </footer>
    </main>

    <!-- Load Data and Main Script -->
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
